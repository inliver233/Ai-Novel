<!doctype html>
<html lang="zh-CN" data-theme="paper-ink">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ainovel Atelier</title>
    <script>
      (() => {
        try {
          const userId = localStorage.getItem("ainovel::auth::user_id") || "local-user";
          const raw = localStorage.getItem(`ainovel::theme::${userId}`);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          const themeId = parsed?.themeId;
          const mode = parsed?.mode;
          const root = document.documentElement;
          if (themeId) root.dataset.theme = themeId;
          if (mode === "dark") root.classList.add("dark");
          if (mode === "light") root.classList.remove("dark");
        } catch {
          // ignore
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
